# Starship configuration
# Increase command timeout to prevent helm timeout warnings
command_timeout = 5000

[aws]
disabled = true

[custom.aws]
command = '"$HOME"/.config/starship/aws-status.sh print'
when = '"$HOME"/.config/starship/aws-status.sh check'
format = 'on [$output]($style) '
style = 'yellow bold'
shell = ['sh', '--noprofile', '--norc']
