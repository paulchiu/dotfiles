[tracking]
enabled = true
history_days = 90

[display]
colors = true
emoji = true
max_width = 120

[filters]
ignore_dirs = [
    ".git",
    "node_modules",
    "target",
    "__pycache__",
    ".venv",
    "vendor",
]
ignore_files = [
    "*.lock",
    "*.min.js",
    "*.min.css",
]

[tee]
enabled = true
mode = "failures"
max_files = 20
max_file_size = 1048576

[telemetry]
enabled = false

[hooks]
# Workaround for rtk-ai/rtk#2077: yadm is not a git alias, but rtk rewrites
# `yadm <cmd>` to `rtk git <cmd>`, which runs against the CWD repo instead of
# yadm's `--git-dir`/`--work-tree`. Remove once rtk-ai/rtk#2078 ships.
exclude_commands = ["^yadm(?:$| )"]
transparent_prefixes = []

[limits]
grep_max_results = 200
grep_max_per_file = 25
status_max_files = 15
status_max_untracked = 10
passthrough_max_chars = 2000
